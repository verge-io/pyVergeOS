name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Run linter
        run: uv run ruff check .

      - name: Run format check
        run: uv run ruff format --check .

      - name: Run type checker
        run: uv run mypy pyvergeos

      - name: Run tests
        run: uv run pytest tests/unit -v --cov --cov-fail-under=80

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Check version matches release tag
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          tag_ver="${tag#v}"
          pkg_ver=$(grep '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [ "$tag_ver" != "$pkg_ver" ]; then
            echo "::error::Release tag ($tag_ver) does not match package version ($pkg_ver)"
            exit 1
          fi
          echo "Tag $tag matches package version $pkg_ver"

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
